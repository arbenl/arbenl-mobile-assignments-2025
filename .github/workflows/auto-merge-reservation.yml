name: Auto-merge Reservation

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    branches: [ main ]
    paths:
      - CLOUD_TOPICS_2026.md
      - mcc-2026.html

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: reservation-claims-main
  cancel-in-progress: false

jobs:
  merge-valid-claim:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted main scripts
        uses: actions/checkout@v4
        with:
          ref: main
          path: main
          fetch-depth: 0

      - name: Checkout student PR content
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          path: pr
          fetch-depth: 0
          persist-credentials: false

      - name: Add main remote to PR checkout
        run: |
          set -euo pipefail
          cd pr
          git remote add upstream "https://github.com/${{ github.repository }}.git"
          git fetch upstream main
          git branch --track main upstream/main || true

      - name: Validate claim against latest main
        id: validate
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          cd pr
          GITHUB_BASE_REF=main node ../main/scripts/check-claim.js > ../validation-output.txt 2>&1

      - name: Comment with correction instructions
        if: steps.validate.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          cat > comment.md <<'EOF'
          Your reservation was not accepted automatically. Please read the exact validator message below first.

          What went wrong:
          ```text
          EOF
          sed -n '1,120p' validation-output.txt >> comment.md
          cat >> comment.md <<'EOF'
          ```

          Correct reservation format:

          ```text
          NN. Topic Title — (Taken by Full Name <email@example.com>; Stack: Chosen stack)
          ```

          How to fix it:
          - Edit only `CLOUD_TOPICS_2026.md`.
          - Change exactly one existing topic line from `(Available)` to `(Taken by Full Name <email@example.com>; Stack: Chosen stack)`.
          - If the topic is already yours, you may edit the same topic line to add or change `; Stack: ...`, but keep the same name or email.
          - Keep the topic title exactly the same.
          - Keep the `Cloud focus` and `Score` lines.
          - Do not edit `mcc-2026.html`.
          - Do not rename files.
          - Do not put two students on one topic.
          - One student can reserve only one assignment.
          - If the PR is messy, close it and open a new PR from a fresh fork/branch.

          ---

          Rezervimi juaj nuk u pranua automatikisht. Lexoni së pari mesazhin e saktë të validatorit më lart.

          Formati i saktë:

          ```text
          NN. Titulli i temës — (Taken by Emri Mbiemri <email@example.com>; Stack: Stack-u i zgjedhur)
          ```

          Si ta rregulloni:
          - Ndryshoni vetëm `CLOUD_TOPICS_2026.md`.
          - Ndryshoni saktësisht një rresht ekzistues nga `(Available)` në `(Taken by Emri Mbiemri <email@example.com>; Stack: Stack-u i zgjedhur)`.
          - Nëse tema është tashmë e juaja, mund të editoni po atë rresht për të shtuar ose ndryshuar `; Stack: ...`, por mbani të njëjtin emër ose email.
          - Ruani titullin e temës pa ndryshime.
          - Mos fshini rreshtat `Cloud focus` dhe `Score`.
          - Mos editoni `mcc-2026.html`.
          - Mos riemërtoni fajlla.
          - Mos vendosni dy studentë në një temë.
          - Një student mund të rezervojë vetëm një detyrë.
          - Nëse PR-ja është bërë rrëmujë, mbylleni dhe hapni një PR të ri nga fork/branch i pastër.
          EOF

          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body-file comment.md

      - name: Email correction instructions
        if: steps.validate.outcome == 'failure'
        continue-on-error: true
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_REPLY_TO: ${{ secrets.SMTP_REPLY_TO }}
          SMTP_SSL: ${{ secrets.SMTP_SSL }}
          PR_DIR: pr
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          VALIDATION_OUTPUT: validation-output.txt
          GITHUB_BASE_REF: main
        run: |
          set -euo pipefail
          python3 main/scripts/send-failed-reservation-email.py

      - name: Stop invalid reservation
        if: steps.validate.outcome == 'failure'
        run: exit 1

      - name: Merge valid reservation
        if: steps.validate.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh pr merge "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --merge \
            --delete-branch
