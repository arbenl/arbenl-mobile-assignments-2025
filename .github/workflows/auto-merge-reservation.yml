name: Auto-merge Reservation

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    branches: [ main ]
    paths:
      - CLOUD_TOPICS_2026.md
      - mcc-2026.html

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: reservation-claims-main
  cancel-in-progress: false

jobs:
  merge-valid-claim:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted main scripts
        uses: actions/checkout@v4
        with:
          ref: main
          path: main
          fetch-depth: 0

      - name: Checkout student PR content
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          path: pr
          fetch-depth: 0
          persist-credentials: false

      - name: Add main remote to PR checkout
        run: |
          set -euo pipefail
          cd pr
          git remote add upstream "https://github.com/${{ github.repository }}.git"
          git fetch upstream main
          git branch --track main upstream/main || true

      - name: Validate claim against latest main
        id: validate
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          cd pr
          GITHUB_BASE_REF=main node ../main/scripts/check-claim.js > ../validation-output.txt 2>&1

      - name: Comment with correction instructions
        if: steps.validate.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          cat > comment.md <<'EOF'
          Your reservation was not accepted automatically.

          Please fix the PR or open a new one using exactly this rule:

          ```text
          NN. Topic Title — (Taken by Full Name <email@example.com>)
          ```

          Requirements:
          - Edit only `CLOUD_TOPICS_2026.md`.
          - Change exactly one topic line.
          - Keep the topic title exactly the same.
          - Keep the `Cloud focus` and `Score` lines.
          - Do not edit `mcc-2026.html`.
          - Do not rename files.
          - Do not put two students on one topic.
          - One student can reserve only one assignment.

          ---

          Rezervimi juaj nuk u pranua automatikisht.

          Ju lutem rregulloni PR-në ose hapni një PR të ri me këtë format:

          ```text
          NN. Titulli i temës — (Taken by Emri Mbiemri <email@example.com>)
          ```

          Rregullat:
          - Ndryshoni vetëm `CLOUD_TOPICS_2026.md`.
          - Ndryshoni saktësisht një rresht teme.
          - Ruani titullin e temës pa ndryshime.
          - Mos fshini rreshtat `Cloud focus` dhe `Score`.
          - Mos editoni `mcc-2026.html`.
          - Mos riemërtoni fajlla.
          - Mos vendosni dy studentë në një temë.
          - Një student mund të rezervojë vetëm një detyrë.

          Validator output:
          ```text
          EOF
          sed -n '1,80p' validation-output.txt >> comment.md
          cat >> comment.md <<'EOF'
          ```
          EOF

          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body-file comment.md

      - name: Stop invalid reservation
        if: steps.validate.outcome == 'failure'
        run: exit 1

      - name: Merge valid reservation
        if: steps.validate.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh pr merge "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --merge \
            --delete-branch
